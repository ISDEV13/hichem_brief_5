services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: DockerFile
    ports:
      - "8501:8501"
    depends_on:
      - backend

  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - backend
